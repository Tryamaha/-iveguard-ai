<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06101d">
<title>DriveGuard AI V21 Cinematic Native</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
width:100%;height:100%;overflow:hidden;background:#06101d;color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
#map{
position:fixed;inset:0;z-index:1;
filter:brightness(1.06) contrast(1.08) saturate(1.06);
transform-origin:center center;
transition:transform .8s ease;
}
.mapShade{
position:fixed;inset:0;z-index:2;pointer-events:none;
background:
radial-gradient(circle at center,rgba(0,0,0,0) 20%,rgba(0,0,0,.20) 100%),
linear-gradient(to bottom,rgba(0,0,0,.04),transparent,rgba(0,0,0,.24));
}
.satDim{
position:fixed;inset:0;z-index:3;pointer-events:none;
background:rgba(0,0,0,.14);display:none;
}
.glass{
background:linear-gradient(145deg,rgba(8,15,30,.76),rgba(3,7,18,.60));
backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(150,190,255,.14);
box-shadow:0 10px 30px rgba(0,0,0,.32);
}

.topPanel{
position:absolute;z-index:20;
top:calc(env(safe-area-inset-top) + 8px);
left:8px;width:48%;
border-radius:18px;padding:8px;
}
.brandRow{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:14px;font-weight:950}
.pill{
font-size:8px;padding:4px 7px;border-radius:999px;
background:linear-gradient(135deg,#00eaff,#245bff);
font-weight:950;
}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px}
.metric{
padding:5px 2px;border-radius:11px;background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);text-align:center;
}
.metric b{font-size:15px;display:block}
.metric span{font-size:7px;color:#cbd8f0;font-weight:800}
.gpsLine{margin-top:5px;font-size:9px;font-weight:950;color:#00ff9d}
.aiRow{margin-top:6px;font-size:9.5px;display:flex;gap:6px;line-height:1.2}
.aiIcon{
min-width:23px;height:23px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
border:1px solid #00eaff;color:#00eaff;font-size:10px;font-weight:950;
}

.controls{
position:absolute;z-index:21;
top:calc(env(safe-area-inset-top) + 12px);
right:8px;width:27%;
display:flex;flex-direction:column;gap:7px;
}
.ctrl{
padding:8px 4px;border-radius:14px;
border:1px solid rgba(160,200,255,.16);
background:linear-gradient(145deg,rgba(5,12,26,.82),rgba(2,6,16,.72));
color:#fff;font-size:9.5px;font-weight:950;
}
.ctrl.primary{background:linear-gradient(135deg,#00eaff,#125cff)}
.ctrl.on{background:linear-gradient(135deg,#00c853,#00eaff)}

.searchBar{
position:absolute;z-index:25;
top:calc(env(safe-area-inset-top) + 172px);
left:8px;right:8px;
border-radius:18px;padding:8px;display:none;
}
.searchRow{
display:grid;grid-template-columns:1fr 1fr 58px;gap:6px;
}
.searchRow input{
height:36px;border:0;border-radius:12px;padding:0 10px;
background:rgba(255,255,255,.94);color:#111;
font-size:11px;font-weight:700;
}
.searchRow button{
border:0;border-radius:12px;
background:linear-gradient(135deg,#00eaff,#125cff);
color:#fff;font-size:11px;font-weight:950;
}
.searchMeta{
margin-top:7px;font-size:10px;color:#dce8ff;
display:flex;justify-content:space-between;
}
.suggestions{
display:none;margin-top:6px;max-height:120px;overflow:auto;
background:rgba(3,7,18,.94);border-radius:12px;
border:1px solid rgba(255,255,255,.10);
}
.suggestion{
padding:8px;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px;
}

.streetChip{
position:absolute;z-index:24;
top:calc(env(safe-area-inset-top) + 172px);
left:72px;right:118px;
border-radius:999px;padding:7px 10px;
font-size:10px;font-weight:950;text-align:center;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.turnBanner{
position:absolute;z-index:26;
top:calc(env(safe-area-inset-top) + 218px);
left:8px;right:8px;
border-radius:18px;padding:10px 12px;display:none;
}
.turnMain{
display:flex;align-items:center;justify-content:space-between;gap:8px;
font-size:13px;font-weight:950;
}
.turnLeft{display:flex;align-items:center;gap:9px;min-width:0}
.turnArrow{
width:34px;height:34px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#00eaff,#125cff);
font-size:19px;font-weight:950;flex-shrink:0;
}
.turnText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.turnSub{
margin-top:5px;font-size:11px;color:#dce8ff;
display:flex;justify-content:space-between;
}

.compass{
position:absolute;z-index:22;
left:12px;top:calc(env(safe-area-inset-top) + 214px);
width:48px;height:48px;border-radius:50%;
display:flex;align-items:center;justify-content:center;flex-direction:column;
font-size:21px;font-weight:950;
}
.compass:before{content:"▲";font-size:9px;color:#00eaff;margin-bottom:-2px}

.carCenter{
width:50px;height:50px;border-radius:50%;
background:
radial-gradient(circle,#ffffff 0%,#8ff7ff 18%,#00c8ff 45%,#126bff 100%);
border:3px solid #fff;
display:flex;align-items:center;justify-content:center;
font-size:20px;font-weight:950;
box-shadow:
0 0 0 10px rgba(0,234,255,.12),
0 0 0 18px rgba(0,234,255,.06),
0 0 28px rgba(0,234,255,.65);
animation:breath 2s infinite ease-in-out;
}
@keyframes breath{
0%{box-shadow:0 0 0 10px rgba(0,234,255,.12),0 0 0 18px rgba(0,234,255,.06),0 0 28px rgba(0,234,255,.55)}
50%{box-shadow:0 0 0 14px rgba(0,234,255,.16),0 0 0 24px rgba(0,234,255,.08),0 0 34px rgba(0,234,255,.75)}
100%{box-shadow:0 0 0 10px rgba(0,234,255,.12),0 0 0 18px rgba(0,234,255,.06),0 0 28px rgba(0,234,255,.55)}
}

.speedHud{
position:absolute;z-index:22;
left:16px;bottom:calc(env(safe-area-inset-bottom) + 108px);
width:82px;height:82px;border-radius:50%;
background:
radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(0,234,255,.20) 27%,rgba(2,8,21,.96) 62%),
conic-gradient(#00eaff 0 70deg,rgba(255,255,255,.08) 70deg 360deg);
border:2px solid rgba(0,234,255,.65);
display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.speedHud b{font-size:28px}
.speedHud span{font-size:9px;color:#8ff7ff;font-weight:900}
.speedLock{
position:absolute;width:10px;height:10px;border-radius:50%;
right:8px;top:9px;background:#00ff9d;box-shadow:0 0 10px #00ff9d;
}

.infoCard{
position:absolute;z-index:22;
left:112px;right:16px;
bottom:calc(env(safe-area-inset-bottom) + 122px);
border-radius:16px;padding:9px 10px;min-height:56px;
}
.infoTitle{font-size:13px;color:#00eaff;font-weight:950;margin-bottom:3px}
.infoText{font-size:10px;line-height:1.28;padding-right:30px}
.infoBadge{
position:absolute;right:8px;top:50%;transform:translateY(-50%);
width:32px;height:32px;border-radius:50%;border:2px solid #ff7845;
display:flex;align-items:center;justify-content:center;font-size:14px;color:#ffb184;
}

.liveFooter{
position:absolute;z-index:24;
left:12px;right:12px;
bottom:calc(env(safe-area-inset-bottom) + 14px);
border-radius:20px;padding:10px;
}
.footerHead{
display:flex;justify-content:space-between;align-items:center;
font-size:11px;font-weight:950;
}
.footerSub{
margin-top:6px;font-size:10px;color:#dce8ff;
display:flex;justify-content:space-between;
}
.progressWrap{
margin-top:8px;height:5px;border-radius:999px;
background:rgba(255,255,255,.10);overflow:hidden;
}
.progress{
height:100%;width:0%;
background:linear-gradient(90deg,#00eaff,#5f5cff,#ff8a00);
}
.trafficDot{
width:12px;height:12px;border-radius:50%;
background:#00c853;box-shadow:0 0 12px #00c853;
}

.alert{
position:absolute;z-index:40;display:none;
left:12px;right:12px;
bottom:calc(env(safe-area-inset-bottom) + 188px);
border-radius:16px;padding:12px;
background:linear-gradient(135deg,#ff1744,#ff8a00);
}
.alert h2{font-size:15px}
.alert p{font-size:11px}

.leaflet-control-attribution{opacity:.12!important;transform:scale(.5)}
</style>
</head>

<body>
<div id="map"></div>
<div class="mapShade"></div>
<div class="satDim" id="satDim"></div>

<div class="topPanel glass">
<div class="brandRow">
<div class="brand">DriveGuard AI</div>
<div class="pill">V21 CINEMA</div>
</div>
<div class="metrics">
<div class="metric"><b id="speed">0</b><span>HIZ</span></div>
<div class="metric"><b id="limit">--</b><span>LİMİT</span></div>
<div class="metric"><b id="distance">--</b><span>MESAFE</span></div>
<div class="metric"><b id="risk">0</b><span>RİSK</span></div>
</div>
<div class="gpsLine" id="gpsState">GPS OFFLINE</div>
<div class="aiRow"><div class="aiIcon">AI</div><div id="aiText">Cinematic navigation hazır.</div></div>
</div>

<div class="controls">
<button class="ctrl primary" onclick="startDrive()">▶ BAŞLAT</button>
<button class="ctrl" onclick="toggleRouteBox()">🧭 ROTA</button>
<button class="ctrl" onclick="toggleLayers()">🗺️ HARİTA</button>
<button class="ctrl" onclick="toggleVoice()">🔊 SES <span id="voiceState">AÇIK</span></button>
<button class="ctrl on" id="trafficBtn" onclick="toggleTraffic()">🚦 TRAFİK</button>
<button class="ctrl" onclick="centerCar()">⌖ KONUM</button>
</div>

<div class="streetChip glass" id="streetChip">Yol adı bekleniyor</div>

<div class="searchBar glass" id="routeBox">
<div class="searchRow">
<input id="fromInput" placeholder="Nereden?">
<input id="toInput" placeholder="Nereye? mekan / adres / şehir">
<button onclick="searchAndRoute()">GİT</button>
</div>
<div class="searchMeta">
<div id="routeInfo">Rota bekleniyor</div>
<div id="poiInfo">Nokta: --</div>
</div>
<div class="suggestions" id="suggestions"></div>
</div>

<div class="turnBanner glass" id="turnBanner">
<div class="turnMain">
<div class="turnLeft">
<div class="turnArrow" id="navArrow">➜</div>
<div class="turnText" id="navInstruction">Rota bekleniyor</div>
</div>
<div id="navDistance">--</div>
</div>
<div class="turnSub">
<div id="navEta">ETA --</div>
<div id="navTraffic">Trafik --</div>
</div>
</div>

<div class="compass glass" id="compass">N</div>

<div class="speedHud">
<div class="speedLock" id="speedLock"></div>
<b id="orbSpeed">0</b>
<span>KM/S</span>
</div>

<div class="infoCard glass">
<div class="infoTitle" id="infoTitle">Hazır</div>
<div class="infoText" id="infoText">Canlı rota ve güvenli sürüş sistemi beklemede.</div>
<div class="infoBadge" id="infoBadge">AI</div>
</div>

<div class="liveFooter glass">
<div class="footerHead">
<div style="display:flex;align-items:center;gap:7px"><div class="trafficDot" id="trafficDot"></div><div id="trafficText">Canlı veri hazır</div></div>
<div id="trafficLevel">LIVE</div>
</div>
<div class="footerSub">
<div id="laneText">Şerit hazır</div>
<div id="nextPoint">Nokta: --</div>
<div id="nextMeter">-- m</div>
</div>
<div class="progressWrap"><div class="progress" id="progress"></div></div>
</div>

<div class="alert" id="alertBox">
<h2 id="alertTitle">Uyarı</h2>
<p id="alertText"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TOMTOM_KEY="EBqQEtO3y8XtbjCXFuxwqBOLocMz0xrW";

let map,baseLayer,trafficLayer,markerLayer,carMarker,accuracyCircle;
let navRouteGlow,navRouteLine,navRouteCore,traveledLine,guideLine;
let currentLat=null,currentLng=null,currentHeading=0,lastLat=null,lastLng=null,watchId=null;
let voiceEnabled=true,trafficEnabled=true,mapMode="classic";
let traveled=[],safetyPoints=[],currentDestination=null,currentRouteCoords=[];
let routeInstructions=[],nextInstructionIndex=0;
let lastWarnTime=0,lastWarnKey="",lastTrafficVoice=0,lastInstructionVoice=0,lastStreetLookup=0;

const saved=JSON.parse(localStorage.getItem("driveguard_points")||"[]");

const demoPoints=[
{name:"Manisa Ortalama Hız Koridoru",lat:38.6260,lng:27.4352,limit:70,type:"average",note:"Ortalama hız ölçüm alanı"},
{name:"Manisa EDS Hız Kamerası",lat:38.6191,lng:27.4289,limit:50,type:"camera",note:"Elektronik hız kontrol bölgesi"},
{name:"Okul Bölgesi",lat:38.6212,lng:27.4241,limit:30,type:"school",note:"Yaya geçişi yoğun alan"},
{name:"Tehlikeli Kavşak",lat:38.6157,lng:27.4315,limit:50,type:"danger",note:"Kaza riski yüksek kavşak"}
];

const tileLayers={
classic:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
terrain:"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
satellite:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
dark:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
};

function initMap(){
map=L.map("map",{zoomControl:false,attributionControl:true}).setView([38.6191,27.4289],16);
setBaseLayer("classic");

trafficLayer=L.tileLayer(
"https://api.tomtom.com/traffic/map/4/tile/flow/relative0/{z}/{x}/{y}.png?key="+TOMTOM_KEY,
{maxZoom:20,opacity:.66}
).addTo(map);

navRouteGlow=L.polyline([],{color:"#ffffff",weight:13,opacity:.34}).addTo(map);
navRouteLine=L.polyline([],{color:"#126bff",weight:9,opacity:.88}).addTo(map);
navRouteCore=L.polyline([],{color:"#63d9ff",weight:3,opacity:.95}).addTo(map);

traveledLine=L.polyline([],{color:"#00eaff",weight:5,opacity:.9}).addTo(map);
guideLine=L.polyline([],{color:"#00eaff",weight:8,opacity:.16}).addTo(map);

markerLayer=L.layerGroup().addTo(map);

createLayerSheet();
loadRadarNetwork();
bindSearchSuggest();
registerOfflineMode();
}

function setBaseLayer(type){
mapMode=type;

if(baseLayer)map.removeLayer(baseLayer);

baseLayer=L.tileLayer(tileLayers[type],{
maxZoom:20,
attribution:""
}).addTo(map);

document.getElementById("satDim").style.display=type==="satellite"?"block":"none";

if(trafficLayer&&trafficEnabled)trafficLayer.addTo(map);

setText("infoTitle","Harita Modu");
setText("infoText",
type==="classic"?"Klasik harita aktif.":
type==="terrain"?"Arazi görünümü aktif.":
type==="satellite"?"Uydu görünümü aktif.":
"Gece haritası aktif."
);
}

function createLayerSheet(){
if(document.getElementById("layerSheet"))return;

const sheet=document.createElement("div");
sheet.id="layerSheet";
sheet.className="glass";
sheet.style.cssText="position:absolute;z-index:35;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 18px);border-radius:22px;padding:12px;display:none";
sheet.innerHTML=`
<div style="font-size:13px;font-weight:950;margin-bottom:10px">Harita görünümü</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
<button onclick="setBaseLayer('classic');toggleLayers(false)" style="border:0;border-radius:15px;padding:12px 4px;color:#fff;font-size:10px;font-weight:950;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)">Klasik</button>
<button onclick="setBaseLayer('terrain');toggleLayers(false)" style="border:0;border-radius:15px;padding:12px 4px;color:#fff;font-size:10px;font-weight:950;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)">Arazi</button>
<button onclick="setBaseLayer('satellite');toggleLayers(false)" style="border:0;border-radius:15px;padding:12px 4px;color:#fff;font-size:10px;font-weight:950;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)">Uydu</button>
<button onclick="setBaseLayer('dark');toggleLayers(false)" style="border:0;border-radius:15px;padding:12px 4px;color:#fff;font-size:10px;font-weight:950;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)">Gece</button>
</div>`;
document.body.appendChild(sheet);
}

function toggleLayers(force){
const el=document.getElementById("layerSheet");
if(!el)return;
if(force===false){el.style.display="none";return;}
el.style.display=el.style.display==="block"?"none":"block";
}

async function loadRadarNetwork(){
const offlineData=await loadOfflineRadars();

safetyPoints=(offlineData&&Array.isArray(offlineData.points))?normalizePoints(offlineData.points):[...demoPoints];
safetyPoints=[...safetyPoints,...saved];

drawSafetyPoints();
setInitialInfo();
}

async function loadOfflineRadars(){
try{
const r=await fetch("./radars.json?v="+Date.now());
if(r.ok){
const d=await r.json();
localStorage.setItem("radars_cache",JSON.stringify(d));
return d;
}
}catch(e){
const c=localStorage.getItem("radars_cache");
if(c)return JSON.parse(c);
}
return null;
}

function normalizePoints(arr){
return arr.map(x=>({
name:x.name||"Güvenlik Noktası",
lat:Number(x.lat),
lng:Number(x.lng),
limit:Number(x.limit||50),
type:x.type||"camera",
note:x.note||"Güvenlik farkındalık noktası"
})).filter(x=>!Number.isNaN(x.lat)&&!Number.isNaN(x.lng));
}

function drawSafetyPoints(){
markerLayer.clearLayers();

safetyPoints.forEach(p=>{
const s=styleFor(p.type);

const icon=L.divIcon({
html:`<div style="
width:31px;height:31px;border-radius:50%;
background:${s.color};
border:3px solid white;
display:flex;align-items:center;justify-content:center;
font-size:13px;
box-shadow:0 0 15px ${s.color};
">${s.icon}</div>`,
className:"",
iconSize:[31,31],
iconAnchor:[15,15]
});

L.marker([p.lat,p.lng],{icon})
.addTo(markerLayer)
.bindPopup(`<b>${p.name}</b><br>${p.note}<br>Limit ${p.limit} km/s`);
});
}

function styleFor(type){
if(type==="average")return{color:"#f58a1f",icon:"⏱"};
if(type==="camera")return{color:"#7c4dff",icon:"📷"};
if(type==="school")return{color:"#2878ff",icon:"🎓"};
if(type==="danger")return{color:"#ff273d",icon:"!"};
if(type==="fuel")return{color:"#00b894",icon:"⛽"};
if(type==="rest")return{color:"#2f7bff",icon:"☕"};
if(type==="user")return{color:"#00d97e",icon:"📍"};
return{color:"#00d97e",icon:"📍"};
}

function setInitialInfo(){
if(!safetyPoints.length)return;

const p=safetyPoints[0];

setText("limit",p.limit);
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${p.limit} km/s`);
setText("nextPoint","Nokta: "+p.name);
setText("infoBadge",styleFor(p.type).icon);
}

function toggleRouteBox(){
const box=document.getElementById("routeBox");
box.style.display=box.style.display==="block"?"none":"block";
}

function collapseRouteBox(){
document.getElementById("routeBox").style.display="none";
document.getElementById("turnBanner").style.display="block";
}

function bindSearchSuggest(){
const from=document.getElementById("fromInput");
const to=document.getElementById("toInput");

from.addEventListener("focus",()=>{
if(currentLat&&currentLng&&!from.value)reverseCurrentLocation();
});

to.addEventListener("input",debounce(async function(){
const q=this.value.trim();

if(q.length<3){
document.getElementById("suggestions").style.display="none";
return;
}

const results=await tomtomSearch(q);
showSuggestions(results);
},350));
}

async function reverseCurrentLocation(){
if(!currentLat||!currentLng)return;

try{
const url=`https://api.tomtom.com/search/2/reverseGeocode/${currentLat},${currentLng}.json?key=${TOMTOM_KEY}&language=tr-TR`;
const r=await fetch(url);
const d=await r.json();
const address=d.addresses?.[0]?.address?.freeformAddress;

if(address){
document.getElementById("fromInput").value=address;
setText("streetChip",address);
}
}catch(e){}
}

async function updateStreetName(){
const now=Date.now();

if(now-lastStreetLookup<12000||!currentLat||!currentLng)return;

lastStreetLookup=now;

try{
const url=`https://api.tomtom.com/search/2/reverseGeocode/${currentLat},${currentLng}.json?key=${TOMTOM_KEY}&language=tr-TR`;
const r=await fetch(url);
const d=await r.json();
const a=d.addresses?.[0]?.address;
const street=a?.streetName||a?.freeformAddress||"Yol bilgisi alınıyor";

setText("streetChip",street);
}catch(e){}
}

async function tomtomSearch(query){
const lat=currentLat||38.6191;
const lon=currentLng||27.4289;

const url=
`https://api.tomtom.com/search/2/search/${encodeURIComponent(query)}.json`+
`?key=${TOMTOM_KEY}`+
`&limit=8&countrySet=TR&language=tr-TR`+
`&lat=${lat}&lon=${lon}&radius=120000`+
`&idxSet=POI,PAD,Addr,Geo,Str,XStr&typeahead=true`;

try{
const r=await fetch(url);
const d=await r.json();
return d.results||[];
}catch(e){
return[];
}
}

function showSuggestions(results){
const box=document.getElementById("suggestions");

if(!results.length){
box.style.display="none";
return;
}

box.innerHTML="";

results.forEach(r=>{
const label=r.poi?.name||r.address?.freeformAddress||r.address?.municipality||"Konum";
const sub=r.address?.freeformAddress||r.address?.municipality||"";

const div=document.createElement("div");
div.className="suggestion";
div.innerHTML=`<b>${label}</b><br><span style="color:#9fb0d0">${sub}</span>`;
div.onclick=()=>{
document.getElementById("toInput").value=label;
currentDestination={lat:r.position.lat,lng:r.position.lon,name:label};
box.style.display="none";
};
box.appendChild(div);
});

box.style.display="block";
}

async function searchAndRoute(){
if(!currentLat||!currentLng){
alert("Önce BAŞLAT ile konum alın.");
return;
}

let dest=currentDestination;

if(!dest){
const q=document.getElementById("toInput").value.trim();

if(!q){
alert("Hedef gir.");
return;
}

const results=await tomtomSearch(q);

if(!results.length){
alert("Hedef bulunamadı.");
return;
}

dest={
lat:results[0].position.lat,
lng:results[0].position.lon,
name:results[0].poi?.name||results[0].address?.freeformAddress||q
};
}

await calculateRoute(dest);
}
async function calculateRoute(dest){
const url=
`https://api.tomtom.com/routing/1/calculateRoute/${currentLat},${currentLng}:${dest.lat},${dest.lng}/json`+
`?key=${TOMTOM_KEY}&traffic=true&travelMode=car&routeType=fastest&instructionsType=text&language=tr-TR`;

try{
const r=await fetch(url);
const d=await r.json();

if(!d.routes||!d.routes.length){
alert("Rota bulunamadı.");
return;
}

const route=d.routes[0];
const pts=route.legs[0].points.map(p=>[p.latitude,p.longitude]);

currentRouteCoords=pts;
currentDestination=dest;

navRouteGlow.setLatLngs(pts);
navRouteLine.setLatLngs(pts);
navRouteCore.setLatLngs(pts);

routeInstructions=extractInstructions(route);
nextInstructionIndex=0;
updateNavInstruction();

const sum=route.summary;
const km=(sum.lengthInMeters/1000).toFixed(1);
const min=Math.round(sum.travelTimeInSeconds/60);
const delay=Math.round((sum.trafficDelayInSeconds||0)/60);
const eta=new Date(Date.now()+sum.travelTimeInSeconds*1000).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});

const poiCount=countPointsOnRoute(pts);
const restCount=await loadRoutePOI(pts);

setText("routeInfo",`${dest.name} • ${km} km • ${min} dk`);
setText("poiInfo",`Radar: ${poiCount} • Mola: ${restCount}`);
setText("navEta",`ETA ${eta} • ${km} km • ${min} dk`);
setText("navTraffic",trafficLabel(delay));
setText("aiText",`${dest.name} rotası hazır. ${km} km, yaklaşık ${min} dakika.`);
setText("infoTitle","Rota oluşturuldu");
setText("infoText",`Trafik gecikmesi ${delay} dk • Güzergâhta ${poiCount} güvenlik noktası.`);
setText("infoBadge","🧭");

updateTrafficFromDelay(delay);
collapseRouteBox();

map.fitBounds(navRouteLine.getBounds(),{padding:[45,45]});

if(voiceEnabled)speak(`Rota oluşturuldu. ${dest.name}. Yaklaşık ${min} dakika.`);
}catch(e){
alert("Rota servisine ulaşılamadı.");
}
}

function extractInstructions(route){
const instructions=[];
const raw=route.guidance?.instructions||[];

raw.forEach(ins=>{
if(ins.message&&typeof ins.routeOffsetInMeters==="number"){
instructions.push({
message:ins.message,
distance:ins.routeOffsetInMeters,
street:ins.street||"",
maneuver:ins.maneuver||""
});
}
});

return instructions;
}

function startDrive(){
if(!navigator.geolocation){
alert("Konum desteği yok.");
return;
}

if(watchId!==null){
centerCar();
return;
}

if(voiceEnabled)speak("DriveGuard AI cinematic navigasyon aktif.");

watchId=navigator.geolocation.watchPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;
const speed=Math.round((pos.coords.speed||0)*3.6);
const acc=pos.coords.accuracy;
const h=pos.coords.heading;

currentLat=lat;
currentLng=lng;

if(lastLat!==null&&lastLng!==null){
const move=distanceMeters(lastLat,lastLng,lat,lng);
if(move>4){
currentHeading=bearingTo(lastLat,lastLng,lat,lng);
}else if(h!==null&&!Number.isNaN(h)&&speed>8){
currentHeading=h;
}
}else if(h!==null&&!Number.isNaN(h)){
currentHeading=h;
}

lastLat=lat;
lastLng=lng;

updateGPSState(acc);
updateCameraRotation(currentHeading);

if(!document.getElementById("fromInput").value)reverseCurrentLocation();

drawCar(lat,lng,acc,currentHeading);
updateTraveledRoute(lat,lng);
analyzeSafety(lat,lng,speed,currentHeading);
updateTurnByTurn(lat,lng);
updateStreetName();
},err=>{
alert("Konum izni gerekli.");
setText("gpsState","GPS OFFLINE");
},{enableHighAccuracy:true,maximumAge:1000,timeout:10000});
}

function updateCameraRotation(heading){
const mapEl=document.getElementById("map");
if(!mapEl)return;

if(currentRouteCoords.length>0){
mapEl.style.transform=`rotate(${-heading}deg) scale(1.12)`;
}else{
mapEl.style.transform="rotate(0deg) scale(1)";
}
}

function updateGPSState(acc){
let txt="GPS LIVE";
let color="#00ff9d";

if(acc>40){
txt="GPS ZAYIF";
color="#ffb300";
}
if(acc>80){
txt="GPS OFFLINE";
color="#ff1744";
}

const el=document.getElementById("gpsState");
el.innerText=txt+" • ±"+Math.round(acc)+"m";
el.style.color=color;
}

function drawCar(lat,lng,acc,heading){
const icon=L.divIcon({
html:`<div class="carCenter" style="transform:rotate(${heading}deg)">➤</div>`,
className:"",
iconSize:[50,50],
iconAnchor:[25,25]
});

if(!carMarker){
carMarker=L.marker([lat,lng],{icon}).addTo(map);
accuracyCircle=L.circle([lat,lng],{
radius:acc,
color:"#00eaff",
fillColor:"#00eaff",
fillOpacity:.05
}).addTo(map);
}else{
carMarker.setLatLng([lat,lng]);
carMarker.setIcon(icon);
accuracyCircle.setLatLng([lat,lng]);
accuracyCircle.setRadius(acc);
}

map.setView([lat,lng],17,{animate:true});
}

function updateTraveledRoute(lat,lng){
traveled.push([lat,lng]);
if(traveled.length>250)traveled.shift();

traveledLine.setLatLngs(traveled);

const projected=projectPoint(lat,lng,currentHeading,260);
guideLine.setLatLngs([[lat,lng],projected]);
}

function updateNavInstruction(){
if(!routeInstructions.length){
setText("navInstruction","Rota takip ediliyor");
setText("navDistance","--");
setText("navArrow","➜");
setText("laneText","Şerit hazır");
return;
}

const ins=routeInstructions[Math.min(nextInstructionIndex,routeInstructions.length-1)];
setText("navInstruction",ins.message||"Rota takip ediliyor");
setText("navDistance",formatMeters(ins.distance||0));
setText("navArrow",maneuverIcon(ins.maneuver));
updateLaneAssistant(ins.maneuver);
}

function updateTurnByTurn(lat,lng){
if(!routeInstructions.length||!currentRouteCoords.length)return;

const currentOffset=nearestRouteOffsetMeters(lat,lng,currentRouteCoords);

while(nextInstructionIndex<routeInstructions.length-1&&
routeInstructions[nextInstructionIndex].distance<currentOffset-20){
nextInstructionIndex++;
}

const ins=routeInstructions[Math.min(nextInstructionIndex,routeInstructions.length-1)];
const remaining=Math.max(0,ins.distance-currentOffset);

setText("navInstruction",ins.message||"Rota takip ediliyor");
setText("navDistance",formatMeters(remaining));
setText("navArrow",maneuverIcon(ins.maneuver));
updateLaneAssistant(ins.maneuver);

if(voiceEnabled&&remaining<350&&remaining>45){
const now=Date.now();
if(now-lastInstructionVoice>28000){
lastInstructionVoice=now;
speak(`${Math.round(remaining)} metre sonra. ${ins.message}`);
}
}
}

function updateLaneAssistant(m){
const s=(m||"").toLowerCase();

if(s.includes("left")){
setText("laneText","Sol şerit");
}else if(s.includes("right")){
setText("laneText","Sağ şerit");
}else if(s.includes("roundabout")){
setText("laneText","Kavşak");
}else if(s.includes("arrive")){
setText("laneText","Hedef");
}else{
setText("laneText","Düz devam");
}
}

function nearestRouteOffsetMeters(lat,lng,pts){
let bestIndex=0,best=Infinity,total=0;
const cumulative=[0];

for(let i=1;i<pts.length;i++){
total+=distanceMeters(pts[i-1][0],pts[i-1][1],pts[i][0],pts[i][1]);
cumulative[i]=total;
}

for(let i=0;i<pts.length;i++){
const d=distanceMeters(lat,lng,pts[i][0],pts[i][1]);
if(d<best){
best=d;
bestIndex=i;
}
}

return cumulative[bestIndex]||0;
}

function analyzeSafety(lat,lng,speed,heading){
if(!safetyPoints.length)return;

const nearest=getNearestForward(lat,lng,heading);
const p=nearest.point;
const d=nearest.distance;
const limit=p.limit||50;

let risk=0;
if(d<1500)risk+=8;
if(d<1000)risk+=12;
if(d<700)risk+=18;
if(d<400)risk+=22;
if(speed>limit)risk+=25;
if(speed>limit+15)risk+=18;
if(p.type==="school")risk+=14;
if(p.type==="danger")risk+=18;
risk=Math.max(0,Math.min(100,risk));

setText("speed",speed);
setText("orbSpeed",speed);
setText("limit",limit);
setText("distance",Math.round(d)+"m");
setText("risk",risk);
setText("compass",headingLabel(heading));
setText("nextPoint","Nokta: "+p.name);
setText("nextMeter",Math.round(d)+" m");
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${limit} km/s • Risk ${risk}/100`);
setText("infoBadge",styleFor(p.type).icon);

document.getElementById("progress").style.width=
Math.max(5,100-Math.min(100,(d/2000)*100))+"%";

let msg=`${p.name} yaklaşık ${Math.round(d)} metre ileride.`;
if(speed>limit)msg+=" Hız limitini aşıyorsun.";
else if(d<500)msg+=" Yaklaşan dikkat noktası var.";
else msg+=" Sürüş stabil.";
setText("aiText",msg);

if(speed>limit){
warnOnce(
"speed-"+p.name,
"Hız Uyarısı",
`Mevcut hız ${speed} km/s. Limit ${limit} km/s.`,
`Hız limitini aşıyorsunuz. ${p.name} bölgesine yaklaşıyorsunuz.`
);
}else if(d<850&&d>700){
warnOnce(
"far-"+p.name,
p.name,
`${Math.round(d)} metre sonra. ${p.note}`,
`Yaklaşık ${Math.round(d)} metre sonra ${p.name}.`
);
}else if(d<420&&d>260){
warnOnce(
"near-"+p.name,
p.name,
`${Math.round(d)} metre sonra. ${p.note}`,
`${Math.round(d)} metre sonra dikkat.`
);
}
}

function getNearestForward(lat,lng,heading){
let best=null,bestDistance=Infinity;

safetyPoints.forEach(p=>{
const d=distanceMeters(lat,lng,p.lat,p.lng);
const bearing=bearingTo(lat,lng,p.lat,p.lng);
const diff=angleDiff(heading,bearing);

if(d<bestDistance&&(d<250||diff<115)){
best=p;
bestDistance=d;
}
});

if(!best){
safetyPoints.forEach(p=>{
const d=distanceMeters(lat,lng,p.lat,p.lng);
if(d<bestDistance){
best=p;
bestDistance=d;
}
});
}

return{point:best,distance:bestDistance};
}

function countPointsOnRoute(pts){
let count=0;

safetyPoints.forEach(p=>{
for(let i=0;i<pts.length;i+=8){
if(distanceMeters(p.lat,p.lng,pts[i][0],pts[i][1])<120){
count++;
break;
}
}
});

return count;
}

async function loadRoutePOI(routePts){
if(!routePts.length)return 0;

const mid=routePts[Math.floor(routePts.length/2)];
const query="benzinlik mola dinlenme tesisi market cafe";
const url=
`https://api.tomtom.com/search/2/search/${encodeURIComponent(query)}.json`+
`?key=${TOMTOM_KEY}&limit=10&countrySet=TR&language=tr-TR`+
`&lat=${mid[0]}&lon=${mid[1]}&radius=25000&idxSet=POI`;

try{
const r=await fetch(url);
const d=await r.json();
const results=d.results||[];
let count=0;

results.forEach(x=>{
if(!x.position)return;
const cat=(x.poi?.categories||[]).join(" ").toLowerCase();
const p={
name:x.poi?.name||"Mola Noktası",
lat:x.position.lat,
lng:x.position.lon,
limit:50,
type:cat.includes("fuel")||cat.includes("gas")?"fuel":"rest",
note:x.address?.freeformAddress||"Güzergâh üzeri önemli nokta"
};
safetyPoints.push(p);
count++;
});

drawSafetyPoints();
return count;
}catch(e){
return 0;
}
}

function warnOnce(key,title,msg,voiceMsg){
const now=Date.now();

if(key===lastWarnKey&&now-lastWarnTime<90000)return;
if(now-lastWarnTime<22000)return;

lastWarnKey=key;
lastWarnTime=now;

setText("alertTitle",title);
setText("alertText",msg);
document.getElementById("alertBox").style.display="block";

if(voiceEnabled)speak(voiceMsg);
if(navigator.vibrate)navigator.vibrate([250,100,250]);

setTimeout(()=>{
document.getElementById("alertBox").style.display="none";
},5000);
}

function updateTrafficFromDelay(delay){
let txt="Trafik akışı rahat",lvl="AKICI",color="#00c853";

if(delay>=10){
txt="Rotada yoğun trafik var";
lvl="YOĞUN";
color="#ff1744";

const now=Date.now();
if(voiceEnabled&&now-lastTrafficVoice>60000){
lastTrafficVoice=now;
speak("Rotada yoğun trafik var.");
}
}else if(delay>=3){
txt="Rotada orta trafik var";
lvl="ORTA";
color="#ffb300";
}

document.getElementById("trafficDot").style.background=color;
document.getElementById("trafficDot").style.boxShadow="0 0 12px "+color;
setText("trafficText",txt);
setText("trafficLevel",lvl);
}

function trafficLabel(delay){
if(delay>=10)return`Trafik yoğun • +${delay} dk`;
if(delay>=3)return`Trafik orta • +${delay} dk`;
return"Trafik akıcı";
}

function toggleTraffic(){
trafficEnabled=!trafficEnabled;

if(trafficEnabled){
map.addLayer(trafficLayer);
document.getElementById("trafficBtn").classList.add("on");
}else{
map.removeLayer(trafficLayer);
document.getElementById("trafficBtn").classList.remove("on");
}
}

function centerCar(){
if(currentLat&&currentLng){
map.setView([currentLat,currentLng],17,{animate:true});
}
}

function maneuverIcon(m){
const s=(m||"").toLowerCase();
if(s.includes("left"))return"↰";
if(s.includes("right"))return"↱";
if(s.includes("roundabout"))return"↻";
if(s.includes("uturn"))return"↶";
if(s.includes("arrive"))return"🏁";
return"➜";
}

function formatMeters(m){
if(m>=1000)return(m/1000).toFixed(1)+" km";
return Math.round(m)+" m";
}

function headingLabel(d){
if(d===null||Number.isNaN(d))return"N";
const arr=["N","NE","E","SE","S","SW","W","NW"];
return arr[Math.round(d/45)%8];
}

function distanceMeters(lat1,lng1,lat2,lng2){
const R=6371000;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingTo(lat1,lng1,lat2,lng2){
const y=Math.sin((lng2-lng1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
const x=
Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-
Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.cos((lng2-lng1)*Math.PI/180);
return(Math.atan2(y,x)*180/Math.PI+360)%360;
}

function angleDiff(a,b){
if(a===null||Number.isNaN(a))return 0;
let d=Math.abs(a-b)%360;
return d>180?360-d:d;
}

function projectPoint(lat,lng,bearing,meters){
const R=6371000;
const brng=bearing*Math.PI/180;
const lat1=lat*Math.PI/180;
const lng1=lng*Math.PI/180;
const d=meters/R;

const lat2=Math.asin(
Math.sin(lat1)*Math.cos(d)+
Math.cos(lat1)*Math.sin(d)*Math.cos(brng)
);

const lng2=lng1+Math.atan2(
Math.sin(brng)*Math.sin(d)*Math.cos(lat1),
Math.cos(d)-Math.sin(lat1)*Math.sin(lat2)
);

return[lat2*180/Math.PI,lng2*180/Math.PI];
}

function debounce(fn,delay){
let timer;
return function(...args){
clearTimeout(timer);
timer=setTimeout(()=>fn.apply(this,args),delay);
};
}

function speak(text){
if(!("speechSynthesis" in window))return;
const u=new SpeechSynthesisUtterance(text);
u.lang="tr-TR";
u.rate=.95;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

function toggleVoice(){
voiceEnabled=!voiceEnabled;
setText("voiceState",voiceEnabled?"AÇIK":"KAPALI");
if(voiceEnabled)speak("Sesli navigasyon aktif.");
}

function setText(id,val){
const el=document.getElementById(id);
if(el)el.innerText=val;
}

function registerOfflineMode(){
if("serviceWorker"in navigator){
window.addEventListener("load",()=>{
navigator.serviceWorker.register("./sw.js").catch(()=>{});
});
}
}
