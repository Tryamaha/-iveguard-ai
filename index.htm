<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06101d">
<title>DriveGuard AI V13 Navi Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#06101d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#fff}
#map{position:fixed;inset:0;z-index:1;filter:brightness(1.03) contrast(1.05) saturate(1.06)}
.mapShade{position:fixed;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.01),rgba(0,0,0,.18))}
.glass{
background:linear-gradient(145deg,rgba(8,15,30,.72),rgba(3,7,18,.58));
backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(150,190,255,.14);
box-shadow:0 10px 30px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.03);
}
.topPanel{position:absolute;z-index:20;top:calc(env(safe-area-inset-top) + 8px);left:8px;width:49%;border-radius:18px;padding:8px}
.brandRow{display:flex;justify-content:space-between;align-items:center}
.brand{font-size:14px;font-weight:950}
.pill{font-size:8px;padding:4px 7px;border-radius:999px;background:linear-gradient(135deg,#00eaff,#245bff);font-weight:950}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:7px}
.metric{padding:5px 2px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-align:center}
.metric b{font-size:16px;display:block}
.metric span{font-size:7px;color:#cbd8f0;font-weight:800}
.aiRow{margin-top:7px;font-size:10px;display:flex;gap:6px;line-height:1.2}
.aiIcon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #00eaff;color:#00eaff;font-size:10px;font-weight:950}
.controls{position:absolute;z-index:21;top:calc(env(safe-area-inset-top) + 12px);right:8px;width:26%;display:flex;flex-direction:column;gap:7px}
.ctrl{
padding:9px 4px;border-radius:14px;border:1px solid rgba(160,200,255,.16);
background:linear-gradient(145deg,rgba(5,12,26,.82),rgba(2,6,16,.72));
color:#fff;font-size:10px;font-weight:950
}
.ctrl.primary{background:linear-gradient(135deg,#00eaff,#125cff);box-shadow:0 0 18px rgba(0,234,255,.25)}
.compass{position:absolute;z-index:22;left:12px;top:calc(env(safe-area-inset-top) + 160px);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:22px;font-weight:950}
.compass:before{content:"▲";font-size:9px;color:#00eaff;margin-bottom:-2px}
.carCenter{
width:40px;height:40px;border-radius:50%;
background:linear-gradient(135deg,#00eaff,#126bff);border:3px solid #fff;
display:flex;align-items:center;justify-content:center;font-size:18px;
box-shadow:0 0 0 10px rgba(0,234,255,.10),0 0 22px rgba(0,234,255,.45)
}
.speedDial{
position:absolute;z-index:22;left:16px;bottom:calc(env(safe-area-inset-bottom) + 120px);
width:86px;height:86px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(0,234,255,.20) 26%,rgba(2,8,21,.96) 60%),
conic-gradient(#00eaff 0 70deg,transparent 70deg 360deg);
border:2px solid rgba(0,234,255,.65);
display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.speedDial b{font-size:28px}
.speedDial span{font-size:9px;color:#8ff7ff;font-weight:900}
.infoCard{
position:absolute;z-index:22;left:122px;right:16px;
bottom:calc(env(safe-area-inset-bottom) + 132px);
border-radius:16px;padding:9px 10px;min-height:58px
}
.infoTitle{font-size:13px;color:#00eaff;font-weight:950;margin-bottom:3px}
.infoText{font-size:10px;line-height:1.28;padding-right:30px}
.infoBadge{
position:absolute;right:8px;top:50%;transform:translateY(-50%);
width:32px;height:32px;border-radius:50%;border:2px solid #ff7845;
display:flex;align-items:center;justify-content:center;font-size:14px;color:#ffb184
}
.nextBar{
position:absolute;z-index:22;left:16px;right:16px;
bottom:calc(env(safe-area-inset-bottom) + 42px);
border-radius:16px;padding:10px
}
.nextTop{display:flex;justify-content:space-between;font-size:11.5px;font-weight:950}
.progressWrap{margin-top:8px;height:5px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#00eaff,#5f5cff,#ff8a00);transition:.3s}
.alert{position:absolute;z-index:40;display:none;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 205px);border-radius:16px;padding:12px;background:linear-gradient(135deg,#ff1744,#ff8a00)}
.alert h2{font-size:15px}.alert p{font-size:11px}
.status{display:none}
.leaflet-control-attribution{opacity:.14!important;transform:scale(.5)}
.radarPulse{
animation:pulse 1.8s infinite;
}
@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.82}
100%{transform:scale(1);opacity:1}
}
</style>
</head>
<body>
<div id="map"></div>
<div class="mapShade"></div>

<div class="topPanel glass">
<div class="brandRow"><div class="brand">DriveGuard AI</div><div class="pill">V13 PRO</div></div>
<div class="metrics">
<div class="metric"><b id="speed">0</b><span>HIZ</span></div>
<div class="metric"><b id="limit">--</b><span>LİMİT</span></div>
<div class="metric"><b id="distance">--</b><span>MESAFE</span></div>
<div class="metric"><b id="risk">0</b><span>RİSK</span></div>
</div>
<div class="aiRow"><div class="aiIcon">AI</div><div id="aiText">AI güvenli sürüş sistemi hazır.</div></div>
</div>

<div class="controls">
<button class="ctrl primary" onclick="startDrive()">▶ BAŞLAT</button>
<button class="ctrl" onclick="toggleVoice()">🔊 SES <span id="voiceState">AÇIK</span></button>
<button class="ctrl" onclick="toggleNight()">🌙 GECE</button>
<button class="ctrl" onclick="centerCar()">⌖ KONUM</button>
<button class="ctrl" onclick="savePoint()">✚ NOKTA</button>
</div>

<div class="compass glass" id="compass">N</div>
<div class="speedDial"><b id="orbSpeed">0</b><span>KM/S</span></div>

<div class="infoCard glass">
<div class="infoTitle" id="infoTitle">Hazır</div>
<div class="infoText" id="infoText">Başlat butonuna basınca canlı radar analizi başlayacak.</div>
<div class="infoBadge" id="infoBadge">AI</div>
</div>

<div class="nextBar glass">
<div class="nextTop"><div id="nextPoint">Yaklaşan nokta: --</div><div id="nextMeter">-- m</div></div>
<div class="progressWrap"><div class="progress" id="progress"></div></div>
</div>

<div class="alert" id="alertBox"><h2 id="alertTitle">Uyarı</h2><p id="alertText"></p></div>
<div class="status" id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* DEVAM KODU ÇOK UZUN — bir sonraki mesajda JS motor kısmını gönderiyorum */
</script>
</body>
</html>
<script>
let map, carMarker, accuracyCircle, routeLine, guideLine;
let currentLat=null,currentLng=null,currentHeading=0;
let voiceEnabled=true,lastWarn=0,watchId=null;
let routePoints=[];
let markerLayer=null;
let safetyPoints=[];

const saved = JSON.parse(localStorage.getItem("driveguard_points") || "[]");

const demoPoints = [
{name:"Manisa Ortalama Hız Koridoru",lat:38.6260,lng:27.4352,limit:70,type:"average",note:"Ortalama hız ölçüm alanı"},
{name:"Manisa EDS Hız Kamerası",lat:38.6191,lng:27.4289,limit:50,type:"camera",note:"Elektronik hız kontrol bölgesi"},
{name:"Okul Bölgesi",lat:38.6212,lng:27.4241,limit:30,type:"school",note:"Yaya geçişi yoğun alan"},
{name:"Tehlikeli Kavşak",lat:38.6157,lng:27.4315,limit:50,type:"danger",note:"Kaza riski yüksek kavşak"}
];

function initMap(){
map = L.map("map",{zoomControl:false,attributionControl:true}).setView([38.6191,27.4289],16);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:20,
attribution:""
}).addTo(map);

drawDemoRoad();

guideLine = L.polyline([],{
color:"#009dff",
weight:8,
opacity:.25
}).addTo(map);

routeLine = L.polyline([],{
color:"#00eaff",
weight:5,
opacity:.9
}).addTo(map);

markerLayer = L.layerGroup().addTo(map);

loadRadarNetwork();
registerOfflineMode();
}

async function loadRadarNetwork(){
let loaded = false;
const offlineData = await loadOfflineRadars();

if(offlineData && Array.isArray(offlineData.points)){
safetyPoints = normalizePoints(offlineData.points);
loaded = true;
}

if(!loaded){
safetyPoints = [...demoPoints];
}

safetyPoints = [...safetyPoints, ...saved];

drawSafetyPoints();
setDemoInfo();
}

async function loadOfflineRadars(){
try{
const res = await fetch("./radars.json?v=" + Date.now());
if(res.ok){
const data = await res.json();
localStorage.setItem("radars_cache", JSON.stringify(data));
return data;
}
}catch(e){
const cached = localStorage.getItem("radars_cache");
if(cached){
return JSON.parse(cached);
}
}
return null;
}

function normalizePoints(arr){
return arr.map(x=>({
name:x.name || "Güvenlik Noktası",
lat:Number(x.lat),
lng:Number(x.lng),
limit:Number(x.limit || 50),
type:x.type || "camera",
note:x.note || "Güvenlik ve hız farkındalık noktası"
})).filter(x=>!Number.isNaN(x.lat) && !Number.isNaN(x.lng));
}

function setDemoInfo(){
if(!safetyPoints.length)return;
const p = safetyPoints[0];
setText("limit",p.limit);
setText("distance","--");
setText("risk","0");
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${p.limit} km/s • Risk 0/100`);
setText("nextPoint","Yaklaşan nokta: " + p.name);
setText("nextMeter","-- m");
setText("infoBadge",styleFor(p.type).icon);
}

function drawDemoRoad(){
const road=[
[38.6138,27.4256],
[38.6164,27.4276],
[38.6191,27.4289],
[38.6220,27.4312],
[38.6268,27.4356]
];

L.polyline(road,{color:"#ff8a00",weight:12,opacity:.12}).addTo(map);
L.polyline(road,{color:"#ffb05a",weight:3,opacity:.28}).addTo(map);
}

function drawSafetyPoints(){
markerLayer.clearLayers();

safetyPoints.forEach(p=>{
const s = styleFor(p.type);
const icon = L.divIcon({
html:`<div class="radarPulse" style="
width:31px;height:31px;border-radius:50%;
background:${s.color};border:3px solid white;
display:flex;align-items:center;justify-content:center;
font-size:13px;box-shadow:0 0 15px ${s.color};
">${s.icon}</div>`,
className:"",
iconSize:[31,31],
iconAnchor:[15,15]
});

L.marker([p.lat,p.lng],{icon}).addTo(markerLayer)
.bindPopup(`<b>${p.name}</b><br>${p.note}<br>Limit ${p.limit} km/s`);
});
}

function styleFor(type){
if(type==="average") return {color:"#f58a1f",icon:"⏱"};
if(type==="camera") return {color:"#7c4dff",icon:"📷"};
if(type==="school") return {color:"#2878ff",icon:"🎓"};
if(type==="danger") return {color:"#ff273d",icon:"!"};
if(type==="user") return {color:"#00d97e",icon:"📍"};
return {color:"#00d97e",icon:"📍"};
}

function startDrive(){
if(!navigator.geolocation){
alert("Bu cihazda konum desteği yok.");
return;
}

if(watchId !== null){
centerCar();
return;
}

if(voiceEnabled){
speak("DriveGuard AI canlı sürüş analizi aktif.");
}

watchId = navigator.geolocation.watchPosition(
function(pos){
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;
const speed = Math.round((pos.coords.speed || 0) * 3.6);
const acc = pos.coords.accuracy;
const h = pos.coords.heading;

currentLat = lat;
currentLng = lng;

if(h !== null && !Number.isNaN(h)){
currentHeading = h;
}

drawCar(lat,lng,acc,currentHeading);
updateRoute(lat,lng);
analyze(lat,lng,speed,currentHeading);
},
function(error){
alert("Konum izni gerekli: " + error.message);
},
{
enableHighAccuracy:true,
maximumAge:1000,
timeout:10000
}
);
}

function drawCar(lat,lng,acc,heading){
const icon = L.divIcon({
html:`<div class="carCenter" style="transform:rotate(${heading}deg)">➤</div>`,
className:"",
iconSize:[40,40],
iconAnchor:[20,20]
});

if(!carMarker){
carMarker = L.marker([lat,lng],{icon}).addTo(map);
accuracyCircle = L.circle([lat,lng],{
radius:acc,
color:"#00eaff",
fillColor:"#00eaff",
fillOpacity:.06
}).addTo(map);
}else{
carMarker.setLatLng([lat,lng]);
carMarker.setIcon(icon);
accuracyCircle.setLatLng([lat,lng]);
accuracyCircle.setRadius(acc);
}

map.setView([lat,lng],17,{animate:true});
}

function updateRoute(lat,lng){
routePoints.push([lat,lng]);
if(routePoints.length > 250) routePoints.shift();

routeLine.setLatLngs(routePoints);

if(routePoints.length > 1){
const last = routePoints[routePoints.length-1];
const projected = projectPoint(last[0],last[1],currentHeading,260);
guideLine.setLatLngs([last, projected]);
}
}

function analyze(lat,lng,speed,heading){
if(!safetyPoints.length)return;

const nearest = getNearestForward(lat,lng,heading);
const p = nearest.point;
const d = nearest.distance;
const limit = p.limit || 50;

let risk = 0;
if(d < 1500) risk += 8;
if(d < 1000) risk += 12;
if(d < 700) risk += 18;
if(d < 400) risk += 22;
if(speed > limit) risk += 25;
if(speed > limit + 15) risk += 18;
if(p.type === "school") risk += 14;
if(p.type === "danger") risk += 18;
risk = Math.max(0,Math.min(100,risk));

setText("speed",speed);
setText("orbSpeed",speed);
setText("limit",limit);
setText("distance",Math.round(d)+"m");
setText("risk",risk);
setText("compass",headingLabel(heading));
setText("nextPoint","Yaklaşan nokta: " + p.name);
setText("nextMeter",Math.round(d)+" m");
setText("infoTitle",p.name);
setText("infoText",`${p.note} • Limit ${limit} km/s • Risk ${risk}/100`);
setText("infoBadge",styleFor(p.type).icon);

let progress = 100 - Math.min(100,(d/2000)*100);
progress = Math.max(5,Math.min(100,progress));
document.getElementById("progress").style.width = progress + "%";

let msg = `${p.name} yaklaşık ${Math.round(d)} metre ileride.`;
if(speed > limit) msg += " Hız limitini aşıyorsun.";
else if(d < 500) msg += " Yaklaşan dikkat noktası var.";
else msg += " Sürüş stabil.";

setText("aiText",msg);

if(speed > limit){
warn(
"Hız Uyarısı",
`Mevcut hız ${speed} km/s. Limit ${limit} km/s.`,
`Hız limitini aşıyorsunuz. ${p.name} bölgesine yaklaşıyorsunuz.`
);
}
else if(d < 800 && d > 400){
warn(
p.name,
`${Math.round(d)} metre sonra. ${p.note}`,
`Yaklaşık ${Math.round(d)} metre sonra ${p.name}.`
);
}
else if(d <= 400){
warn(
p.name,
`${Math.round(d)} metre sonra. ${p.note}`,
`${p.name} noktasına giriş yapılıyor.`
);
}
}

function getNearestForward(lat,lng,heading){
let best = null;
let bestDistance = Infinity;

safetyPoints.forEach(p=>{
const d = distanceMeters(lat,lng,p.lat,p.lng);
const bearing = bearingTo(lat,lng,p.lat,p.lng);
const diff = angleDiff(heading,bearing);

if(d < bestDistance && (d < 250 || diff < 115)){
best = p;
bestDistance = d;
}
});

if(!best){
safetyPoints.forEach(p=>{
const d = distanceMeters(lat,lng,p.lat,p.lng);
if(d < bestDistance){
best = p;
bestDistance = d;
}
});
}

return {point:best,distance:bestDistance};
}

function warn(title,msg,voiceMsg){
const now = Date.now();
if(now - lastWarn < 9000) return;
lastWarn = now;

setText("alertTitle",title);
setText("alertText",msg);
document.getElementById("alertBox").style.display = "block";

if(voiceEnabled) speak(voiceMsg);
if(navigator.vibrate) navigator.vibrate([250,100,250]);

setTimeout(()=>{
document.getElementById("alertBox").style.display = "none";
},5000);
}

function speak(text){
if(!("speechSynthesis" in window)) return;
const u = new SpeechSynthesisUtterance(text);
u.lang = "tr-TR";
u.rate = .95;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

function toggleVoice(){
voiceEnabled = !voiceEnabled;
setText("voiceState",voiceEnabled ? "AÇIK" : "KAPALI");

if(voiceEnabled){
speak("Sesli radar ikaz sistemi aktif.");
}
}

function toggleNight(){
const shade = document.querySelector(".mapShade");
if(shade.style.background){
shade.style.background = "";
}else{
shade.style.background = "linear-gradient(to bottom,rgba(2,7,19,.24),rgba(2,7,19,.08),rgba(2,7,19,.34))";
}
}

function centerCar(){
if(currentLat && currentLng){
map.setView([currentLat,currentLng],17,{animate:true});
}
}

function savePoint(){
if(!currentLat || !currentLng){
alert("Önce BAŞLAT ile konum alın.");
return;
}

const name = prompt("Nokta adı","Dikkat Noktası");
if(!name) return;

saved.push({
name:name,
lat:currentLat,
lng:currentLng,
limit:50,
type:"user",
note:"Kullanıcı tarafından eklenen güvenlik noktası"
});

localStorage.setItem("driveguard_points",JSON.stringify(saved));
alert("Nokta kaydedildi. Sayfayı yenile.");
}

function headingLabel(d){
if(d === null || Number.isNaN(d)) return "N";
const arr = ["N","NE","E","SE","S","SW","W","NW"];
return arr[Math.round(d/45)%8];
}

function distanceMeters(lat1,lng1,lat2,lng2){
const R = 6371000;
const dLat = (lat2-lat1) * Math.PI / 180;
const dLng = (lng2-lng1) * Math.PI / 180;
const a =
Math.sin(dLat/2) ** 2 +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLng/2) ** 2;
return R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearingTo(lat1,lng1,lat2,lng2){
const y = Math.sin((lng2-lng1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
const x =
Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) -
Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
Math.cos((lng2-lng1)*Math.PI/180);
return (Math.atan2(y,x) * 180 / Math.PI + 360) % 360;
}

function angleDiff(a,b){
if(a === null || Number.isNaN(a)) return 0;
let d = Math.abs(a-b) % 360;
return d > 180 ? 360-d : d;
}

function projectPoint(lat,lng,bearing,meters){
const R = 6371000;
const brng = bearing * Math.PI / 180;
const lat1 = lat * Math.PI / 180;
const lng1 = lng * Math.PI / 180;
const d = meters / R;

const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(brng));
const lng2 = lng1 + Math.atan2(Math.sin(brng)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));

return [lat2*180/Math.PI,lng2*180/Math.PI];
}

function setText(id,val){
const el = document.getElementById(id);
if(el) el.innerText = val;
}

function registerOfflineMode(){
if ("serviceWorker" in navigator) {
window.addEventListener("load", () => {
navigator.serviceWorker.register("./sw.js")
.then(() => console.log("Offline mode aktif"))
.catch(err => console.log("SW hata:", err));
});
}
}

initMap();
</script>
</body>
</html>
